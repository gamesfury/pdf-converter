<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor PDF Mercado Libre</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .config-section {
            margin-bottom: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .config-section label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .config-section input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: monospace;
            transition: border-color 0.3s;
        }
        
        .config-section input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .config-hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        
        .dropzone {
            border: 2px dashed #667eea;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9fa;
            margin-bottom: 20px;
        }
        
        .dropzone:hover {
            border-color: #764ba2;
            background: #f0f1ff;
        }
        
        .dropzone.drag-over {
            border-color: #764ba2;
            background: #e8e9ff;
            transform: scale(1.02);
        }
        
        .dropzone-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .dropzone-text {
            color: #333;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .dropzone-hint {
            color: #999;
            font-size: 13px;
        }
        
        #fileInput {
            display: none;
        }
        
        .file-list {
            margin-bottom: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .file-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #333;
        }
        
        .file-item .remove {
            margin-left: auto;
            color: #999;
            cursor: pointer;
            font-size: 16px;
        }
        
        .file-item .remove:hover {
            color: #e74c3c;
        }
        
        .progress-section {
            display: none;
            margin-bottom: 20px;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }
        
        .progress-text {
            font-size: 12px;
            color: #666;
            text-align: center;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-convert {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-convert:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-convert:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-clear:hover {
            background: #e0e0e0;
        }
        
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            border-left: 4px solid #28a745;
            color: #155724;
            display: block;
        }
        
        .status.error {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Conversor PDF</h1>
            <p>Convierte tus PDFs de Mercado Libre de landscape a portrait</p>
        </div>
        
        <div class="config-section">
            <label for="serverUrl">🌐 URL del servidor</label>
            <input type="text" id="serverUrl" placeholder="https://pdf-converter-xxxxx.onrender.com" value="">
            <div class="config-hint">Pega aquí la URL de tu servidor Render después de deployar</div>
        </div>
        
        <div class="status" id="status"></div>
        
        <div class="dropzone" id="dropzone">
            <div class="dropzone-icon">☁️</div>
            <div class="dropzone-text">Arrastra tus PDFs aquí</div>
            <div class="dropzone-hint">o haz click para seleccionar (máx. 500MB)</div>
        </div>
        
        <div class="file-list" id="fileList"></div>
        
        <div class="progress-section" id="progressSection">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Procesando...</div>
        </div>
        
        <div class="button-group">
            <button class="btn-convert" id="convertBtn" disabled>
                ⚙️ Convertir
            </button>
            <button class="btn-clear" id="clearBtn">
                🗑️ Limpiar
            </button>
        </div>
    </div>
    
    <input type="file" id="fileInput" accept=".pdf" multiple>
    
    <script>
        let selectedFiles = [];
        
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const convertBtn = document.getElementById('convertBtn');
        const clearBtn = document.getElementById('clearBtn');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const serverUrlInput = document.getElementById('serverUrl');
        const statusDiv = document.getElementById('status');
        
        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('drag-over');
        });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });
        
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        clearBtn.addEventListener('click', clearFiles);
        convertBtn.addEventListener('click', convertFiles);
        
        function handleFiles(files) {
            selectedFiles = Array.from(files).filter(f => f.type === 'application/pdf');
            renderFileList();
        }
        
        function renderFileList() {
            fileList.innerHTML = selectedFiles.map((file, idx) => `
                <div class="file-item">
                    <span>📄 ${file.name} (${(file.size / 1024 / 1024).toFixed(1)}MB)</span>
                    <span class="remove" onclick="removeFile(${idx})">✕</span>
                </div>
            `).join('');
            
            convertBtn.disabled = selectedFiles.length === 0;
        }
        
        window.removeFile = function(idx) {
            selectedFiles.splice(idx, 1);
            renderFileList();
        };
        
        function clearFiles() {
            selectedFiles = [];
            fileInput.value = '';
            renderFileList();
            statusDiv.style.display = 'none';
            progressSection.style.display = 'none';
        }
        
        async function convertFiles() {
            const serverUrl = serverUrlInput.value.trim();
            
            if (!serverUrl) {
                showStatus('⚠️ Por favor ingresa la URL del servidor', 'error');
                return;
            }
            
            if (selectedFiles.length === 0) {
                showStatus('⚠️ Selecciona al menos un archivo', 'error');
                return;
            }
            
            convertBtn.disabled = true;
            progressSection.style.display = 'block';
            statusDiv.style.display = 'none';
            
            const formData = new FormData();
            selectedFiles.forEach(file => formData.append('files', file));
            
            try {
                const apiUrl = serverUrl.endsWith('/') ? serverUrl : serverUrl + '/';
                const response = await fetch(apiUrl + 'convert', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = selectedFiles.length === 1 ? selectedFiles[0].name : 'pdfs_convertidos.zip';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    a.remove();
                    
                    showStatus(`✓ ${selectedFiles.length} archivo(s) convertido(s) correctamente`, 'success');
                    clearFiles();
                } else {
                    const error = await response.json();
                    showStatus('❌ Error: ' + (error.error || 'Error desconocido'), 'error');
                }
            } catch (error) {
                showStatus('❌ Error de conexión: ' + error.message, 'error');
            } finally {
                convertBtn.disabled = false;
                progressSection.style.display = 'none';
            }
        }
        
        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
            statusDiv.style.display = 'block';
        }
    </script>
</body>
</html>
